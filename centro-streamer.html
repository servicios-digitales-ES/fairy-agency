        /* ── LOGIN MODAL ── */

            background: rgba(0,0,0,0.98);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4000;
        }
        .modal-content {
            background: #111;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 340px;
            width: 90%;
        }
        .modal-content img {
            width: 160px;
            margin-bottom: 20px;
            filter: brightness(1.15);
        }
        .modal-content h2 { color: #ffd700; margin-bottom: 15px; font-size: 20px; }
        #passInput {
            width: 100%;
            padding: 14px;
            background: #222;
            border: none;
            border-radius: 10px;
            color: white;
            margin: 12px 0;
            text-align: center;
            font-size: 15px;
        }
        .btn-entrar {
            background: #ffd700;
            color: black;
            padding: 13px 50px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }
        .btn-entrar:active { background: #e6c200; }

        /* ── MAIN CONTENT ── */
        #mainContent { display: none; }

        /* ── HEADER ── */
        .header {
            display: flex; align-items: center; gap: 12px;
            position: fixed; top: 20px; left: 20px; z-index: 2001;

        .menu-btn { font-size: 24px; color: #ffd700; cursor: pointer; background: none; border: none; }

        .sidebar.active { transform: translateX(0); }

        .menu-item {
            display: flex; justify-content: space-between; align-items: center;

        }

            padding: 9px 20px;
            color: #000;
            font-size: 13px;
            font-weight: bold;

            width: 100%;
            text-align: center;

// ═══════════════════════════════════════
//  LOGIN — patrón global del sistema
// ═══════════════════════════════════════
const PASSWORD = 'fairy2025';
const DURACION = 3 * 60 * 60 * 1000; // 3 horas

function checkPassword() {
    if (document.getElementById('passInput').value === PASSWORD) {
        localStorage.setItem("fairyAccess", "true");
        localStorage.setItem("fairyTime", Date.now());
        document.getElementById("passwordModal").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        initApp();
    } else {
        alert("Contraseña incorrecta");
    }
}

function checkSession() {
    const access = localStorage.getItem("fairyAccess");
    const time   = localStorage.getItem("fairyTime");

    if (!access || !time || (Date.now() - parseInt(time) > DURACION)) {
        localStorage.clear();
        document.getElementById("passwordModal").style.display = "flex";
    } else {
        document.getElementById("passwordModal").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        initApp();
    }
}

function logout() {
    localStorage.clear();
    location.reload();
}

// Verificar expiración cada minuto
setInterval(() => {
    const access = localStorage.getItem("fairyAccess");
    const time   = localStorage.getItem("fairyTime");
    if (!access || !time || (Date.now() - parseInt(time) > DURACION)) {
        localStorage.clear();
        location.reload();
    }
}, 60000);

// ═══════════════════════════════════════
//  ESTADO
// ═══════════════════════════════════════
let mainIdx         = 0;
let subIdx          = 0;
let innerIdx        = 0;
let currentSubKey   = '';
let currentInnerKey = '';
let mainFromSub     = 0;

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
function show(id)     { document.getElementById(id).classList.add('active');    }
function hide(id)     { document.getElementById(id).classList.remove('active'); }
function setTxt(id,v) { document.getElementById(id).textContent = v;            }

function buildTrack(id, imgs) {
    document.getElementById(id).innerHTML =
        imgs.map(s => `<div class="slide"><img src="${s}" loading="lazy"></div>`).join('');
}
function slideTo(id, idx) {
    document.getElementById(id).style.transform = `translateX(-${idx * 100}%)`;
}

// ═══════════════════════════════════════
//  NIVEL 1 — MAIN
// ═══════════════════════════════════════
function mainMove(dir) {
    mainIdx = (mainIdx + dir + 10) % 10;
    slideTo('mainTrack', mainIdx);
    setTxt('mainPag', `${mainIdx + 1} / 10`);
    setTxt('mainDesc', MAIN_DESCS[mainIdx]);
    renderMainBtns(mainIdx);
}

function renderMainBtns(idx) {
    const c = document.getElementById('mainActions');
    c.innerHTML = '';
    const cfg = MAIN_BTNS[idx];
    if (!cfg) return;
    if (cfg.type === 'href') {
        c.innerHTML = `<button class="btn-gold" onclick="location.href='${cfg.href}'">${cfg.label}</button>`;
    } else {
        c.innerHTML = `<button class="btn-gold" onclick="openSub('${cfg.key}')">${cfg.label}</button>`;
    }
}

function goMain(slideIdx) {
    mainIdx = (slideIdx !== undefined) ? slideIdx : mainFromSub;
    slideTo('mainTrack', mainIdx);
    setTxt('mainPag', `${mainIdx + 1} / 10`);
    setTxt('mainDesc', MAIN_DESCS[mainIdx]);
    renderMainBtns(mainIdx);
    currentSubKey   = '';
    currentInnerKey = '';
    subIdx   = 0;
    innerIdx = 0;
    hide('subView');
    hide('innerView');
    show('mainView');
}

// ═══════════════════════════════════════
//  NIVEL 2 — SUBVIEW
// ═══════════════════════════════════════
function openSub(key) {
    currentSubKey = key;
    subIdx = 0;
    const d = SUBVIEWS[key];
    mainFromSub = d.mainSlide;

    setTxt('subTitle', d.title);
    buildTrack('subTrack', d.imgs);
    slideTo('subTrack', 0);

    const pd = document.getElementById('subParentDesc');
    if (d.parentDesc) {
        pd.textContent = d.parentDesc;
        pd.style.display = 'flex';
    } else {
        pd.textContent = '';
        pd.style.display = 'none';
    }

    setTxt('subDesc', d.descs[0] || '');
    setTxt('subPag', `1 / ${d.imgs.length}`);

    hide('mainView');
    hide('innerView');
    show('subView');
    renderSubBtns(0);
}

function subMove(dir) {
    const d = SUBVIEWS[currentSubKey];
    subIdx = (subIdx + dir + d.imgs.length) % d.imgs.length;
    slideTo('subTrack', subIdx);
    setTxt('subPag', `${subIdx + 1} / ${d.imgs.length}`);
    setTxt('subDesc', d.descs[subIdx] || '');
    renderSubBtns(subIdx);
}

function renderSubBtns(idx) {
    const c = document.getElementById('subActions');
    c.innerHTML = '';
    const d = SUBVIEWS[currentSubKey];

    if (d.hasInner && d.innerBtns && d.innerBtns[idx]) {
        const ib = d.innerBtns[idx];
        c.innerHTML += `<button class="btn-gold" onclick="openInner('${ib.key}')">${ib.principal}</button>`;
        if (ib.siguiente) {
            c.innerHTML += `
                <div class="btn-row">
                    <button class="btn-red" onclick="goMain(${d.mainSlide})">← Regresar</button>
                    <button class="btn-next" onclick="openInner('${ib.nextKey}')">${ib.siguiente} →</button>
                </div>`;
        } else {
            c.innerHTML += `
                <div class="btn-row">
                    <button class="btn-red" style="width:100%" onclick="goMain(${d.mainSlide})">← Regresar</button>
                </div>`;
        }
    } else {
        c.innerHTML += `
            <div class="btn-row">
                <button class="btn-red" style="width:100%" onclick="goMain(${d.mainSlide})">← Volver</button>
            </div>`;
        if (currentSubKey === 'view7' && idx === 1) {
            c.innerHTML += `
                <button class="boton-metodo" onclick="location.href='pagos-salsa.html'">
                    Aprende a configurar tu método de pago para poder retirar
                </button>`;
        }
    }
}

// ═══════════════════════════════════════
//  NIVEL 3 — INNERVIEW
// ═══════════════════════════════════════
function openInner(key) {
    currentInnerKey = key;
    innerIdx = 0;
    const d = INNERVIEWS[key];

    setTxt('innerTitle', d.title);
    buildTrack('innerTrack', d.imgs);
    slideTo('innerTrack', 0);
    setTxt('innerDesc', d.descs[0] || '');
    setTxt('innerPag', `1 / ${d.imgs.length}`);

    const pd = document.getElementById('innerParentDesc');
    if (d.parentDesc) {
        pd.textContent = d.parentDesc;
        pd.style.display = 'flex';
    } else {
        pd.textContent = '';
        pd.style.display = 'none';
    }

    hide('subView');
    show('innerView');
    renderInnerBtns();
}

function innerMove(dir) {
    const d = INNERVIEWS[currentInnerKey];
    innerIdx = (innerIdx + dir + d.imgs.length) % d.imgs.length;
    slideTo('innerTrack', innerIdx);
    setTxt('innerPag', `${innerIdx + 1} / ${d.imgs.length}`);
    setTxt('innerDesc', d.descs[innerIdx] || '');
}

function renderInnerBtns() {
    const c = document.getElementById('innerActions');
    c.innerHTML = `
        <div class="btn-row">
            <button class="btn-red" style="width:100%" onclick="closeInner()">← Regresar</button>
        </div>`;
}

function closeInner() {
    currentInnerKey = '';
    innerIdx = 0;
    hide('innerView');
    show('subView');
    renderSubBtns(subIdx);
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
function initApp() {
    show('mainView');
    setTxt('mainDesc', MAIN_DESCS[0]);
    setTxt('mainPag', '1 / 10');
    renderMainBtns(0);
}
</script>
