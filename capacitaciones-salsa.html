<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capacitaciones SALSA — Fairy Agency</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{margin:0;font-family:'Georgia',serif;background:#0a0a0a;color:#eaeaea;}

.menu-btn{position:absolute;top:30px;left:25px;font-size:26px;color:#ffd700;z-index:10001;cursor:pointer;}

.sidebar{position:fixed;top:0;left:-260px;width:260px;height:100%;background:#0b0b0b;padding-top:90px;transition:0.3s;z-index:10000;}
.sidebar.active{left:0;}

.menu-item{display:flex;align-items:center;gap:15px;padding:18px 25px;color:#ddd;text-decoration:none;}
.menu-item i{color:#ffd700;}

.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);opacity:0;visibility:hidden;transition:0.3s;z-index:9999;}
.overlay.active{opacity:1;visibility:visible;}

.pagina{max-width:960px;margin:40px auto;padding:30px;background:#111;border-radius:20px;display:none;}
.pagina.activa{display:block;}

.logo{display:block;margin:0 auto 10px;width:90px;}

h1{text-align:center;color:#ffd700;font-size:34px;}

.tabs{display:flex;justify-content:center;gap:40px;margin-top:20px;}
.tab{cursor:pointer;padding-bottom:5px;}
.tab.active{color:#ffd700;border-bottom:2px solid #ffd700;}

.subtabs{display:flex;justify-content:center;gap:15px;margin-top:20px;}
.subtab{padding:10px 20px;border-radius:10px;background:#222;cursor:pointer;}
.subtab.active{background:#ffd700;color:#000;}

.lista{margin-top:25px;}
.item{display:flex;gap:15px;margin-bottom:18px;align-items:center;}
.item img{width:140px;border-radius:10px;}

.ver{color:#ffd700;text-decoration:none;font-weight:bold;}

.hidden{display:none;}
.empty{text-align:center;color:#888;margin-top:30px;}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">
<i class="fas fa-bars"></i>
</div>

<div class="sidebar" id="sidebar">
<a href="zona-streamer.html" class="menu-item"><i class="fas fa-home"></i> Inicio</a>
<a href="fairy-academy.html" class="menu-item"><i class="fas fa-graduation-cap"></i> Fairy Academy</a>
<a href="salsa.html" class="menu-item"><i class="fas fa-fire"></i> SALSA</a>
<a href="reportes-salsa.html" class="menu-item"><i class="fas fa-chart-bar"></i> Reportes</a>
<a href="binance-streamer.html" class="menu-item"><i class="fab fa-bitcoin"></i> Binance</a>
<a href="noticias.html" class="menu-item"><i class="fas fa-newspaper"></i> Noticias</a>
<a href="reglamento-interno.html" class="menu-item"><i class="fas fa-file-alt"></i> Reglamento</a>
<a href="#" class="menu-item" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Salir</a>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- 🔐 LOGIN -->
<div id="passwordModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;z-index:20000;">
  <div style="background:#111;padding:40px;border-radius:20px;text-align:center;">
    <img src="https://i.postimg.cc/fLhtVJy2/1774069732194.png" width="140">
    <h2 style="color:#ffd700;">Área Privada</h2>
    <input type="password" id="passInput" placeholder="Contraseña" style="padding:12px;width:100%;margin:15px 0;background:#222;border:none;border-radius:10px;color:white;">
    <button onclick="checkPassword()" style="background:#ffd700;padding:12px 30px;border:none;border-radius:10px;font-weight:bold;">Entrar</button>
  </div>
</div>

<section class="pagina" id="mainContent">

<img src="https://i.postimg.cc/fLhtVJy2/1774069732194.png" class="logo">
<h1>Capacitaciones SALSA</h1>

<div class="tabs">
<div class="tab active" onclick="cambiarTab('youtube')">YouTube</div>
<div class="tab" onclick="cambiarTab('meet')">Meet</div>
</div>

<div class="subtabs">
<div class="subtab active" onclick="cambiarSub('grabadas')">Grabadas</div>
<div class="subtab" onclick="cambiarSub('semana')">Esta semana</div>
</div>

<div id="youtube-grabadas" class="lista">
<!-- 🔥 TODO TU CONTENIDO IGUAL (NO TOCADO) -->
<div class="item"><img src="https://img.youtube.com/vi/LMH_0PFb0js/hqdefault.jpg"><div>Bienvenida al mundo Salsa<br><a class="ver" href="https://www.youtube.com/live/LMH_0PFb0js" target="_blank">Ver ▶</a></div></div>
</div>

<div id="youtube-semana" class="lista hidden"><div class="empty">No hay capacitaciones esta semana</div></div>
<div id="meet-grabadas" class="lista hidden"><div class="empty">Sin grabaciones en Meet</div></div>
<div id="meet-semana" class="lista hidden"><div class="empty">No hay capacitaciones esta semana</div></div>

</section>

<script>
function toggleMenu(){
sidebar.classList.toggle("active");
overlay.classList.toggle("active");
}

let tab="youtube";
let sub="grabadas";

function cambiarTab(t){
tab=t;
document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));
event.target.classList.add("active");
actualizar();
}

function cambiarSub(s){
sub=s;
document.querySelectorAll(".subtab").forEach(e=>e.classList.remove("active"));
event.target.classList.add("active");
actualizar();
}

function actualizar(){
document.querySelectorAll(".lista").forEach(e=>e.classList.add("hidden"));
document.getElementById(tab+"-"+sub).classList.remove("hidden");
}

/* 🔥 SESIÓN ARREGLADA */
const PASSWORD="fairy2025";
const DURACION=3*60*60*1000;

window.onload=function(){
const access=localStorage.getItem("fairyAccess");
const time=localStorage.getItem("fairyTime");

if(access==="true" && time && (Date.now()-time<DURACION)){
entrar();
}else{
localStorage.clear();
window.location.href="zona-streamer.html";
}
}

function checkPassword(){
if(passInput.value===PASSWORD){
localStorage.setItem("fairyAccess","true");
localStorage.setItem("fairyTime",Date.now());
entrar();
}
}

function entrar(){
passwordModal.style.display="none";
mainContent.classList.add("activa");
}

function logout(){
localStorage.removeItem("fairyAccess");
localStorage.removeItem("fairyTime");
window.location.href="zona-streamer.html";
}
</script>

</body>
</html>
