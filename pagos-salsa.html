<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagos — SALSA</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body { margin:0; font-family:'Georgia',serif; background:#0a0a0a; color:#eaeaea; }

/* HEADER */
.header {
  display:flex;
  align-items:center;
  gap:12px;
  position:fixed;
  top:20px;
  left:20px;
  z-index:2001;
}

.menu-btn { font-size:24px; color:#ffd700; cursor:pointer; }
.logo-header { width:85px; }

/* SIDEBAR */
.sidebar {
  position:fixed;
  top:0;
  left:0;
  width:260px;
  height:100%;
  background:#111;
  padding:90px 18px 20px;
  transform:translateX(-100%);
  transition:0.3s ease;
  z-index:3000;
}

.sidebar.active { transform:translateX(0); }

.logo-menu {
  width:140px;
  display:block;
  margin:0 auto 30px;
}

.menu-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 12px;
  border-radius:10px;
  cursor:pointer;
}

.menu-item:hover { background:#222; }

.menu-left {
  display:flex;
  align-items:center;
  gap:10px;
}

.menu-left i { color:#ffd700; }

.salsa-s {
  color:#ffd700;
  font-weight:900;
}

.submenu {
  max-height:0;
  overflow:hidden;
  transition:0.3s;
  padding-left:28px;
}

.submenu a {
  display:block;
  padding:8px 0;
  color:#ccc;
  text-decoration:none;
}

.submenu a:hover { color:#ffd700; }

/* OVERLAY */
.overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
  z-index:2500;
}

.overlay.active { opacity:1; visibility:visible; }

/* LOGIN */
#passwordModal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.98);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:4000;
}

.modal-content {
  background:#111;
  padding:40px 30px;
  border-radius:20px;
  text-align:center;
  max-width:340px;
  width:90%;
}

.modal-content img { width:180px; margin-bottom:25px; }

#passInput {
  width:100%;
  padding:15px;
  background:#222;
  border:none;
  border-radius:10px;
  color:white;
  margin:15px 0;
  text-align:center;
}

.btn-entrar {
  background:#ffd700;
  color:black;
  padding:14px 50px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* CONTENIDO */
#mainContent {
  display:none;
  max-width:500px;
  margin:0 auto;
  padding:120px 15px 30px;
}

h1 {
  color:#ffd700;
  text-align:center;
  margin-bottom:25px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.card {
  background:#1a1a1a;
  border-radius:15px;
  padding:25px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:#eaeaea;
  transition:.3s;
  text-align:center;
}

.card:hover { background:#222; }

.card i {
  font-size:40px;
  color:#ffd700;
  margin-bottom:10px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="menu-btn" onclick="toggleMenu()">
    <i class="fa-solid fa-bars"></i>
  </div>
  <img src="https://i.postimg.cc/fLhtVJy2/1774069732194.png" class="logo-header">
</div>

<!-- SIDEBAR (EXACTO) -->
<div class="sidebar" id="sidebar">

  <img src="https://i.postimg.cc/fLhtVJy2/1774069732194.png" class="logo-menu">

  <div class="menu-item" onclick="toggleSub('inicio')">
    <div class="menu-left"><i class="fa-solid fa-house"></i>Inicio</div>▼
  </div>

  <div class="submenu" id="inicio">
    <a href="zona-streamer.html">Zona Streamer</a>
    <a href="fairy-academy.html">Fairy Academy</a>
    <a href="salsa.html">SALSA</a>
    <a href="reportes-salsa.html">Reportes</a>
    <a href="binance-streamer.html">Binance</a>
    <a href="noticias.html">Noticias</a>
    <a href="reglamento-interno.html">Reglamento</a>
  </div>

  <div class="menu-item" onclick="toggleSub('fairy')">
    <div class="menu-left"><i class="fa-solid fa-graduation-cap"></i>Fairy Academy</div>▼
  </div>

  <div class="submenu" id="fairy">
    <a href="capacitaciones.html">Capacitaciones</a>
    <a href="tutoriales.html">Tutoriales</a>
    <a href="tips-fairy.html">Tips Fairy</a>
  </div>

  <div class="menu-item" onclick="toggleSub('salsa')">
    <div class="menu-left"><span class="salsa-s">S</span>SALSA</div>▼
  </div>

  <div class="submenu" id="salsa">
    <a href="capacitaciones-salsa.html">Capacitaciones</a>
    <a href="tutoriales-salsa.html">Tutoriales</a>
    <a href="reglas-salsa.html">Reglas SALSA</a>
    <a href="herramientas-salsa.html">Herramientas</a>
  </div>

  <div class="menu-item" onclick="logout()" style="color:#ff4d4d;">
    <div class="menu-left"><i class="fa-solid fa-right-from-bracket"></i>Salir</div>
  </div>

</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- LOGIN -->
<div id="passwordModal">
  <div class="modal-content">
    <img src="https://i.postimg.cc/fLhtVJy2/1774069732194.png">
    <h2>Área Privada</h2>
    <input type="password" id="passInput" placeholder="Contraseña">
    <button onclick="checkPassword()" class="btn-entrar">Entrar</button>
  </div>
</div>

<!-- CONTENIDO -->
<section id="mainContent">

  <h1>Métodos de Pago</h1>

  <div class="grid">

    <a href="cuenta-bancaria.html" class="card">
      <i class="fa-solid fa-building-columns"></i>
      Cuenta Bancaria
    </a>

    <a href="vincular-binance.html" class="card">
      <i class="fa-solid fa-coins"></i>
      Criptobilletera (Binance)
    </a>

    <a href="pago-agencia.html" class="card">
      <i class="fa-solid fa-hand-holding-dollar"></i>
      Pago por Agencia / Manual
    </a>

  </div>

</section>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

function toggleSub(id){
  const el = document.getElementById(id);
  el.style.maxHeight = el.style.maxHeight ? null : el.scrollHeight + "px";
}

const PASSWORD="fairy2025";
const DURACION=3*60*60*1000;

function checkPassword(){
  if(document.getElementById('passInput').value===PASSWORD){
    localStorage.setItem("fairyAccess","true");
    localStorage.setItem("fairyTime",Date.now());
    document.getElementById("passwordModal").style.display="none";
    document.getElementById("mainContent").style.display="block";
  } else alert("Contraseña incorrecta");
}

function checkSession(){
  const access=localStorage.getItem("fairyAccess");
  const time=localStorage.getItem("fairyTime");
  if(!access||!time||(Date.now()-parseInt(time)>DURACION)){
    localStorage.clear();
    document.getElementById("passwordModal").style.display="flex";
  } else {
    document.getElementById("passwordModal").style.display="none";
    document.getElementById("mainContent").style.display="block";
  }
}

function logout(){
  localStorage.clear();
  window.location.href="zona-streamer.html";
}

checkSession();
</script>

</body>
  </html>
