  height:100vh;

  justify-content:center;
  align-items:center;
  position:relative;
  padding:10px;

}

.slider {
  display:flex;
  width:100%;
  height:100%;

  touch-action: pan-x;
}

.slide {
  min-width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:0 10px;

}

.slide img {

  max-height:84vh;

  font-size:32px;

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

function toggleSub(id){
  const el = document.getElementById(id);
  el.style.maxHeight = el.style.maxHeight ? null : el.scrollHeight + "px";
}

let index = 0;
const slider = document.getElementById("slider");
const total = document.querySelectorAll(".slide").length;

function mover(dir){
  index += dir;
  if(index < 0) index = 0;
  if(index >= total) index = total - 1;
  slider.style.transform = `translateX(-${index * 100}%)`;
}

const PASSWORD = "fairy2025";
const DURACION = 3 * 60 * 60 * 1000;

function checkPassword(){
  if (document.getElementById('passInput').value === PASSWORD) {
    localStorage.setItem("fairyAccess", "true");
    localStorage.setItem("fairyTime", Date.now());
    document.getElementById("passwordModal").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  } else {
    alert("Contraseña incorrecta");
  }
}

function checkSession(){
  const access = localStorage.getItem("fairyAccess");
  const time = localStorage.getItem("fairyTime");

  if (!access || !time || (Date.now() - parseInt(time) > DURACION)) {
    localStorage.clear();
    document.getElementById("passwordModal").style.display = "flex";
    document.getElementById("mainContent").style.display = "none";
  } else {
    document.getElementById("passwordModal").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  }
}

function logout(){
  localStorage.clear();
  window.location.href = "zona-streamer.html";
}
</script>
