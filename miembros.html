<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área Privada - Fairy Agency</title>
<style>
body { margin:0; font-family:'Georgia',serif; background:#0a0a0a; color:#eaeaea; }
.pagina { max-width:900px; margin:40px auto; padding:30px; background:#111; border-radius:12px; display:none; }
.logo { width:220px; margin:0 auto 20px; display:block; }
h1 { color:gold; text-align:center; }
.menu { display:grid; gap:15px; }
.btn-menu { background:gold; color:black; padding:20px; text-align:center; border-radius:12px; font-size:18px; font-weight:bold; text-decoration:none; }
</style>
</head>

<body>

<div id="passwordModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#111;padding:40px;border-radius:12px;text-align:center;max-width:320px;">
    <img src="https://i.postimg.cc/xjw9VDpV/1774069732194.png" style="width:200px;margin-bottom:20px;">
    <h2 style="color:gold;">🔒 Área Privada</h2>
    <p>Ingresa la contraseña</p>
    <input type="password" id="passInput" placeholder="Contraseña" style="padding:15px;width:100%;margin:15px 0;background:#222;border:none;border-radius:8px;color:white;">
    <button onclick="checkPassword()" style="padding:15px 30px;background:gold;color:black;border:none;border-radius:8px;font-weight:bold;">Entrar</button>
  </div>
</div>

<section class="pagina" id="mainContent">
  <img src="https://i.postimg.cc/xjw9VDpV/1774069732194.png" class="logo">
  <h1>Bienvenida, Streamer</h1>
  <div class="menu">
    <a href="capacitaciones.html" class="btn-menu">📅 Capacitaciones</a>
    <a href="#" class="btn-menu">📚 Tutoriales</a>
    <a href="#" class="btn-menu">🕒 Horarios</a>
  </div>
</section>

<script>
const PASSWORD = "fairy2025";
function checkPassword() {
  if (document.getElementById('passInput').value === PASSWORD) {
    localStorage.setItem('access', Date.now());
    document.getElementById('passwordModal').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
  } else {
    alert("Contraseña incorrecta");
  }
}
if (localStorage.getItem('access')) {
  document.getElementById('passwordModal').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
}
</script>
</body>
</html>
